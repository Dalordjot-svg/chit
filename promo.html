<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Акции MOON CAFE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap');

        body {
            margin: 0; padding: 0; 
            min-height: 100vh; 
            background-color: #0b0e14;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 234, 167, 0.05) 0%, transparent 60%),
                radial-gradient(circle at 80% 10%, rgba(116, 185, 255, 0.05) 0%, transparent 40%);
            font-family: 'Montserrat', sans-serif; 
            color: #f1f2f6; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            overflow-x: hidden; user-select: none;
            padding-top: 40px; padding-bottom: 60px;
        }

        /* --- ЛОГОТИП И ЗАГОЛОВОК --- */
        .moon-logo {
            font-size: 1.2rem; font-weight: 900; letter-spacing: 8px;
            color: #ffeaa7; text-transform: uppercase; margin-bottom: 10px;
            display: flex; align-items: center; gap: 10px;
            text-shadow: 0 0 15px rgba(255, 234, 167, 0.4);
        }
        .moon-logo span { font-size: 1.8rem; }

        h1 { 
            font-size: 3.5rem; color: #ffffff; margin: 0 0 5px 0;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            text-align: center;
        }

        /* --- ЦЕНТРАЛЬНЫЙ БЛОК (ЗАГЛУШКА) --- */
        .promo-container {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; padding: 20px; box-sizing: border-box;
        }

        .promo-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; padding: 60px 40px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            max-width: 600px; width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255, 234, 167, 0.02);
        }

        .promo-icon {
            font-size: 6rem; margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(255, 234, 167, 0.2));
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        .promo-card h2 {
            font-size: 2.2rem; color: #ffeaa7; margin: 0 0 20px 0; font-weight: 800;
        }

        .promo-card p {
            font-size: 1.2rem; color: #a4b0be; line-height: 1.6; margin: 0; font-weight: 500;
        }

        /* --- ПОЛОСА ТАЙМЕРА --- */
        .timer-bar {
            position: fixed; bottom: 0; left: 0; height: 5px; 
            background: #ffeaa7; width: 100%; animation: shrink 120s linear forwards; 
            z-index: 100; box-shadow: 0 -2px 15px rgba(255, 234, 167, 0.6);
        }
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }

        /* Кнопка "Назад" */
        .btn-back {
            margin-top: 50px; padding: 18px 50px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: #fff; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .btn-back:hover { background: rgba(255, 234, 167, 0.1); border-color: #ffeaa7; color: #ffeaa7; }
        .btn-back:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="moon-logo"><span>🌙</span> MOON CAFE</div>
    <h1>Акции и предложения</h1>

    <div class="promo-container">
        <div class="promo-card">
            <div class="promo-icon">🎁</div>
            <h2>Пока акций нет</h2>
            <p>Но мы уже готовим для вас что-то очень интересное и вкусное. Следите за обновлениями!</p>
        </div>
    </div>

    <button class="btn-back" id="btnBack">ВЕРНУТЬСЯ К ВЫЗОВУ</button>
    <div class="timer-bar"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBa3MKrLHcRPauIyzxgxfNpLUphmehJAkg",
          authDomain: "moon-logistik.firebaseapp.com",
          databaseURL: "https://moon-logistik-default-rtdb.firebaseio.com",
          projectId: "moon-logistik"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const infoRef = ref(db, 'info_display');

        function goBackToMain() {
            set(infoRef, { active: false, url: '' }).then(() => {
                window.location.href = 'index.html';
            });
        }

        // Таймер автозакрытия (2 минуты)
        let autoCloseTimer = setTimeout(() => { goBackToMain(); }, 120000); 

        // Ручное закрытие
        document.getElementById('btnBack').addEventListener('click', () => {
            clearTimeout(autoCloseTimer);
            goBackToMain();
        });

        // Слушатель команд от кассира
        onValue(infoRef, (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.active) {
                window.location.href = 'index.html';
            } else if (data.url && !window.location.pathname.endsWith(data.url)) {
                window.location.href = data.url;
            }
        });
    </script>
</body>
</html>
