<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пульт Сотрудника</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            transition: background-color 0.3s ease-in-out;
            overflow: hidden;
            user-select: none;
        }

        /* Верхняя панель */
        .top-bar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            font-size: 14px;
            color: #888;
            z-index: 100;
        }

        /* Главная карточка */
        .dashboard {
            background: #1e1e1e;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        h1 { margin: 0 0 10px; font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        p { color: #aaa; margin-bottom: 30px; font-size: 15px; line-height: 1.4; }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            outline: none;
        }

        .btn:active { transform: scale(0.95); }

        .btn-activate {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            display: none;
            font-size: 24px;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.6);
            animation: pulse-btn 1s infinite alternate;
        }

        /* Анимации тревоги */
        @keyframes pulse-btn {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 68, 68, 0.6); }
            100% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 68, 68, 1); }
        }

        .alert-mode { 
            background-color: #3e0000; 
            animation: bg-flash 0.8s infinite alternate;
        }

        @keyframes bg-flash {
            0% { background-color: #3e0000; }
            100% { background-color: #5c0000; }
        }

        .alert-mode .dashboard {
            border-color: #ff4444;
            box-shadow: 0 0 50px rgba(255, 68, 68, 0.3);
        }

        .alert-mode .icon-circle {
            background: #ff4444;
            animation: shake 0.4s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

    </style>
</head>
<body id="body">

    <div class="top-bar">
        <span id="clock">00:00</span>
        <span id="connStatus">🔴 Отключено</span>
    </div>

    <div class="dashboard">
        <div class="icon-circle" id="iconBox">
            <span id="icon">💤</span>
        </div>
        <h1 id="title">Система спит</h1>
        <p id="subtitle">Необходимо активировать пульт для приема сигналов в фоновом режиме.</p>

        <button id="activateBtn" class="btn btn-activate">▶ Активировать пульт</button>
        <button id="stopBtn" class="btn btn-stop">ПРИНЯТЬ ВЫЗОВ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBa3MKrLHcRPauIyzxgxfNpLUphmehJAkg",
          authDomain: "moon-logistik.firebaseapp.com",
          databaseURL: "https://moon-logistik-default-rtdb.firebaseio.com",
          projectId: "moon-logistik",
          storageBucket: "moon-logistik.firebasestorage.app",
          messagingSenderId: "335239459996",
          appId: "1:335239459996:web:98a3cd3508767cfde6a959",
          measurementId: "G-N3GHR5KS7Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const statusRef = ref(db, 'cashier_call/status');

        // Элементы DOM
        const activateBtn = document.getElementById('activateBtn');
        const stopBtn = document.getElementById('stopBtn');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const icon = document.getElementById('icon');
        const body = document.getElementById('body');
        const connStatus = document.getElementById('connStatus');
        const clockEl = document.getElementById('clock');

        // Часы
        setInterval(() => {
            const now = new Date();
            clockEl.textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // Аудио объекты
        const sirenAudio = new Audio("./siren.mp3");
        sirenAudio.loop = true;
        sirenAudio.preload = "auto";

        // "Бесшумный" трек для поддержания жизни вкладки в фоне
        const silentWav = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
        const backgroundAudio = new Audio(silentWav);
        backgroundAudio.loop = true;

        let soundEnabled = false;

        // 1. АКТИВАЦИЯ СИСТЕМЫ
        activateBtn.addEventListener('click', async () => {
            try {
                // Запрос разрешений на уведомления
                if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                    await Notification.requestPermission();
                }

                // Запускаем бесшумный трек для фона
                await backgroundAudio.play();
                
                // Подготавливаем сирену (разблокировка AudioContext)
                await sirenAudio.play();
                sirenAudio.pause();
                sirenAudio.currentTime = 0;

                soundEnabled = true;
                activateBtn.style.display = 'none';
                
                setReadyState();
                requestWakeLock();

            } catch (err) {
                alert("Ошибка активации: " + err.message + "\nУбедитесь, что файл siren.mp3 находится в той же папке.");
                console.error(err);
            }
        });

        // 2. СЛУШАЕМ БАЗУ
        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            const isCalling = data ? data.is_calling : false;

            connStatus.textContent = "🟢 На связи";
            connStatus.style.color = "#4CAF50";

            if (isCalling) {
                startAlarm();
            } else {
                stopAlarmLocal();
            }
        });

        // 3. ЛОГИКА ТРЕВОГИ
        function startAlarm() {
            if (!soundEnabled) return; 

            body.classList.add('alert-mode');
            icon.textContent = "🛎️";
            title.textContent = "ВЫЗОВ!";
            subtitle.textContent = "Сотрудник, подойдите к столику!";
            
            stopBtn.style.display = 'block'; 

            // Переключаем аудио
            backgroundAudio.pause();
            sirenAudio.play().catch(e => console.error("Звук заблокирован:", e));

            // Вибрация
            if (navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 1000]);

            // Системное уведомление
            try {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification("🚨 ВЫЗОВ ПЕРСОНАЛА!", {
                        body: "Вас ожидают. Откройте пульт.",
                        icon: "https://cdn-icons-png.flaticon.com/512/1086/1086581.png",
                        requireInteraction: true
                    });
                }
            } catch(e) { console.log("Уведомления не поддерживаются в этом режиме"); }

            // Управление через шторку плеера
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: '🚨 ВЫЗОВ ПЕРСОНАЛА',
                    artist: 'Ожидают обслуживания',
                });
                navigator.mediaSession.setActionHandler('pause', confirmReset);
            }
        }

        // 4. СБРОС ТРЕВОГИ
        stopBtn.addEventListener('click', confirmReset);

        function confirmReset() {
            // Мгновенная визуальная и звуковая реакция для пользователя
            stopAlarmLocal();
            
            // Отправка данных на сервер
            set(statusRef, {
                is_calling: false,
                timestamp: Date.now()
            }).catch(err => {
                console.error("Ошибка сброса в базе:", err);
                connStatus.textContent = "⚠️ Ошибка связи";
                connStatus.style.color = "#ff4444";
            });
        }

        // Локальная остановка интерфейса и звуков
        function stopAlarmLocal() {
            body.classList.remove('alert-mode');
            sirenAudio.pause();
            sirenAudio.currentTime = 0;
            
            if (navigator.vibrate) navigator.vibrate(0);
            
            stopBtn.style.display = 'none';
            
            if (soundEnabled) {
                setReadyState();
                // Возвращаем фоновый тихий звук
                backgroundAudio.play().catch(() => {}); 
            }
        }

        function setReadyState() {
            title.textContent = "Ожидание вызова";
            subtitle.textContent = "Пульт активен. Экран можно погасить.";
            icon.textContent = "👂";
        }

        // --- Удержание экрана ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                }
            } catch (err) { console.log("Wake Lock error:", err); }
        }
        
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock === null && document.visibilityState === 'visible' && soundEnabled) {
                await requestWakeLock();
            }
        });

    </script>
</body>
</html>
