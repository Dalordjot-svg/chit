<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пульт Сотрудника</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; background-color: #121212; color: #ffffff;
            font-family: 'Roboto', sans-serif; transition: background-color 0.3s; overflow: hidden;
        }

        .top-bar { position: absolute; top: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; background: rgba(0, 0, 0, 0.5); font-size: 14px; color: #888; z-index: 100; }
        .screen-status { color: #ffca28; font-weight: bold; display: none; }

        .dashboard {
            background: #1e1e1e; padding: 30px; border-radius: 24px; text-align: center;
            width: 90%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333; display: flex; flex-direction: column; align-items: center;
        }

        .icon-circle { width: 80px; height: 80px; border-radius: 50%; background: #2a2a2a; display: flex; justify-content: center; align-items: center; font-size: 40px; margin-bottom: 15px; }
        h1 { margin: 0 0 10px; font-size: 24px; }
        p { color: #aaa; margin-bottom: 20px; font-size: 14px; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.2s; color: white; margin-bottom: 10px; }
        .btn:active { transform: scale(0.95); }
        .btn-activate { background: #4CAF50; }
        .btn-stop { background: #ff4444; display: none; animation: pulse-btn 1s infinite alternate; }

        @keyframes pulse-btn { 0% { transform: scale(1); box-shadow: 0 0 10px #ff4444; } 100% { transform: scale(1.05); box-shadow: 0 0 30px #ff4444; } }

        .alert-mode { background-color: #3e0000; }
        .alert-mode .dashboard { border-color: #ff4444; }

        /* --- БЛОК ЗАПРОСА ЧАЕВЫХ --- */
        .tips-panel {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
            width: 100%;
            display: none; /* Покажем после активации пульта */
        }
        
        .tips-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: white;
            font-size: 18px;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }
        .tips-input:focus { border-color: #ffca28; }
        
        .btn-tips {
            background: linear-gradient(135deg, #ffca28, #ff8f00);
            color: #3e2723;
        }

    </style>
</head>
<body id="body">

    <div class="top-bar">
        <span class="screen-status" id="screenStatus">☀️ Экран: ON</span>
        <span id="connStatus">🔴 Отключено</span>
    </div>

    <div class="dashboard">
        <div class="icon-circle" id="iconBox"><span id="icon">💤</span></div>
        <h1 id="title">Система спит</h1>
        <p id="subtitle">Активируйте пульт.</p>

        <button id="activateBtn" class="btn btn-activate">▶ Активировать</button>
        <button id="stopBtn" class="btn btn-stop">ПРИНЯТЬ ВЫЗОВ</button>

        <div class="tips-panel" id="tipsPanel">
            <h3 style="margin: 0 0 10px; font-size: 16px; color: #ffca28;">Запросить чаевые</h3>
            <input type="number" id="billAmount" class="tips-input" placeholder="Сумма заказа (₽)">
            <button id="sendTipsBtn" class="btn btn-tips">Отправить на экран</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBa3MKrLHcRPauIyzxgxfNpLUphmehJAkg",
          authDomain: "moon-logistik.firebaseapp.com",
          databaseURL: "https://moon-logistik-default-rtdb.firebaseio.com",
          projectId: "moon-logistik",
          storageBucket: "moon-logistik.firebasestorage.app",
          messagingSenderId: "335239459996",
          appId: "1:335239459996:web:98a3cd3508767cfde6a959"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const statusRef = ref(db, 'cashier_call/status');
        const tipRequestRef = ref(db, 'tips_request');

        const activateBtn = document.getElementById('activateBtn');
        const stopBtn = document.getElementById('stopBtn');
        const tipsPanel = document.getElementById('tipsPanel');
        const sendTipsBtn = document.getElementById('sendTipsBtn');
        const billAmountInput = document.getElementById('billAmount');
        const title = document.getElementById('title');
        
        const sirenAudio = new Audio("./siren.mp3");
        sirenAudio.loop = true;
        sirenAudio.preload = "auto";
        
        let soundEnabled = false;
        let wakeLock = null;

        async function keepScreenAwake() {
            if (!soundEnabled) return; 
            try {
                if ('wakeLock' in navigator && wakeLock === null) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('screenStatus').style.display = 'inline';
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                }
            } catch (err) {}
        }
        document.addEventListener('pointerdown', keepScreenAwake);

        activateBtn.addEventListener('click', async () => {
            await sirenAudio.play(); sirenAudio.pause(); sirenAudio.currentTime = 0;
            soundEnabled = true;
            activateBtn.style.display = 'none';
            tipsPanel.style.display = 'block'; // Показываем панель чаевых
            title.textContent = "Пульт активен";
            keepScreenAwake();
        });

        // Отправка запроса на чаевые
        sendTipsBtn.addEventListener('click', () => {
            const amount = parseFloat(billAmountInput.value);
            if (!amount || amount <= 0) {
                alert("Введите корректную сумму покупки!");
                return;
            }

            // Отправляем в Firebase
            set(tipRequestRef, {
                active: true,
                amount: amount,
                timestamp: Date.now()
            });

            // Визуальный фидбек для сотрудника
            const originalText = sendTipsBtn.textContent;
            sendTipsBtn.textContent = "✔️ Отправлено!";
            sendTipsBtn.style.background = "#4CAF50";
            sendTipsBtn.style.color = "white";
            billAmountInput.value = ""; // очищаем поле

            setTimeout(() => {
                sendTipsBtn.textContent = originalText;
                sendTipsBtn.style.background = "linear-gradient(135deg, #ffca28, #ff8f00)";
                sendTipsBtn.style.color = "#3e2723";
            }, 2000);
        });

        // Логика тревоги (старая)
        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.is_calling) {
                if (soundEnabled) {
                    document.getElementById('body').classList.add('alert-mode');
                    stopBtn.style.display = 'block';
                    sirenAudio.play().catch(e => {});
                    if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
                }
            } else {
                document.getElementById('body').classList.remove('alert-mode');
                stopBtn.style.display = 'none';
                sirenAudio.pause(); sirenAudio.currentTime = 0;
            }
        });

        stopBtn.addEventListener('click', () => {
            set(statusRef, { is_calling: false });
        });

    </script>
</body>
</html>
