<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOON CAFE - Контакты</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; min-height: 100vh; 
            background-color: #0b0e14;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 234, 167, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(116, 185, 255, 0.05) 0%, transparent 40%);
            font-family: 'Montserrat', sans-serif; 
            color: #f1f2f6; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- ЛОГОТИП --- */
        .logo-container {
            text-align: center; margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
        }
        .moon-logo {
            font-size: 5rem; line-height: 1; margin: 0;
            filter: drop-shadow(0 0 20px rgba(255, 234, 167, 0.4));
        }
        .brand-name {
            font-size: 1.5rem; font-weight: 900; letter-spacing: 8px;
            color: #ffeaa7; text-transform: uppercase; margin-top: 10px;
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-10px); } 
        }

        /* --- ЦЕНТРАЛЬНАЯ КАРТОЧКА --- */
        .vcard {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px; padding: 40px 30px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 234, 167, 0.03);
            position: relative; z-index: 10;
        }

        /* Динамический заголовок */
        .dynamic-title {
            font-size: 1.4rem; font-weight: 800; color: #ffffff;
            margin-bottom: 30px; line-height: 1.4;
        }
        
        .dynamic-title span { color: #ffeaa7; }

        /* Номер телефона */
        .phone-block {
            background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 20px;
            margin-bottom: 30px; border-left: 3px solid #ffeaa7;
        }
        .phone-label { font-size: 0.9rem; color: #a4b0be; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 5px; }
        .phone-number { font-size: 1.8rem; font-weight: 900; color: #ffeaa7; letter-spacing: 1px; }

        /* Кнопка "Позвонить" */
        .btn-main {
            width: 100%; background: #ffeaa7; color: #0b0e14;
            border: none; padding: 20px; border-radius: 20px;
            font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(255, 234, 167, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(255, 234, 167, 0.2); }
        .btn-main .icon { font-size: 1.5rem; }

        /* --- ВСПЛЫВАЮЩЕЕ МЕНЮ ВЫБОРА ЗВОНКА (BOTTOM SHEET) --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #1e222d; border-radius: 30px 30px 0 0;
            z-index: 101; padding: 30px 20px 40px;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .bottom-sheet.active { bottom: 0; }

        .sheet-header {
            text-align: center; margin-bottom: 25px;
        }
        .sheet-handle {
            width: 40px; height: 5px; background: #4a5568; border-radius: 5px; margin: 0 auto 20px;
        }
        .sheet-title { font-size: 1.3rem; font-weight: 800; color: #fff; }

        .action-list { display: flex; flex-direction: column; gap: 15px; }
        
        .action-btn {
            display: flex; align-items: center; gap: 15px;
            width: 100%; padding: 18px 20px; border-radius: 16px;
            text-decoration: none; font-weight: 700; font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.97); }
        
        .btn-cellular { background: rgba(46, 213, 115, 0.15); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.3); }
        .btn-whatsapp { background: rgba(37, 211, 102, 0.15); color: #25D366; border: 1px solid rgba(37, 211, 102, 0.3); }
        .btn-telegram { background: rgba(0, 136, 204, 0.15); color: #0088cc; border: 1px solid rgba(0, 136, 204, 0.3); }

        .action-icon { font-size: 1.5rem; }

        /* Кнопка отмены */
        .btn-cancel-sheet {
            width: 100%; padding: 18px; margin-top: 15px; border-radius: 16px;
            background: rgba(255,255,255,0.05); color: #a4b0be; border: none;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="moon-logo">🌙</div>
        <div class="brand-name">MOON</div>
    </div>

    <div class="vcard">
        <div class="dynamic-title" id="dynamicTitle">
            Загрузка...
        </div>

        <div class="phone-block">
            <div class="phone-label">Телефон для связи:</div>
            <div class="phone-number">8 (923) 267-00-00</div>
        </div>

        <button class="btn-main" id="openSheetBtn">
            <span class="icon">📞</span> Позвонить
        </button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-header">
            <div class="sheet-handle"></div>
            <div class="sheet-title">Как вам удобнее связаться?</div>
        </div>
        <div class="action-list">
            <a href="tel:+79232670000" class="action-btn btn-cellular">
                <span class="action-icon">📱</span> Сотовый звонок
            </a>
            <a href="https://wa.me/79232670000" class="action-btn btn-whatsapp" target="_blank">
                <span class="action-icon">💬</span> Написать в WhatsApp
            </a>
            <a href="https://t.me/+79232670000" class="action-btn btn-telegram" target="_blank">
                <span class="action-icon">✈️</span> Написать в Telegram
            </a>
        </div>
        <button class="btn-cancel-sheet" id="closeSheetBtn">Отмена</button>
    </div>

    <script>
        // База динамических и веселых заголовков
        const titles = [
            "Закажи дискотеку другу, ведь он <span>так ждет этого!</span> 🪩",
            "Праздник? Праздник только с <span>MOON!</span> 🌙",
            "Любимые <span>десерты на заказ</span> для вашего события 🎂",
            "Сделаем ваш день <span>слаще и ярче</span> ✨",
            "Осторожно: наши торты вызывают <span>привыкание!</span> 🍰",
            "Тот самый номер, по которому <span>привозят радость</span> 🎁"
        ];

        // Выбираем случайный заголовок при загрузке страницы
        window.onload = () => {
            const randomTitle = titles[Math.floor(Math.random() * titles.length)];
            document.getElementById('dynamicTitle').innerHTML = randomTitle;
        };

        // Логика всплывающего меню (Bottom Sheet)
        const openBtn = document.getElementById('openSheetBtn');
        const closeBtn = document.getElementById('closeSheetBtn');
        const overlay = document.getElementById('overlay');
        const bottomSheet = document.getElementById('bottomSheet');

        function openSheet() {
            overlay.classList.add('active');
            bottomSheet.classList.add('active');
        }

        function closeSheet() {
            overlay.classList.remove('active');
            bottomSheet.classList.remove('active');
        }

        // Слушатели событий
        openBtn.addEventListener('click', openSheet);
        closeBtn.addEventListener('click', closeSheet);
        overlay.addEventListener('click', closeSheet); // Закрыть при клике на темный фон
    </script>
</body>
</html>
